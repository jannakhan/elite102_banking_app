<!DOCTYPE html>
<html>
<head>
    <title>Banking App</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #004c3e;
        }

        h1 {
            margin-top: 20px;
            color: rgb(255, 255, 255);
        }

        h2 {
            margin-top: 20px;
            color: rgb(255, 255, 255);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 150px);
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }

        .box {
            background: #006252;
            color: rgb(255, 255, 255);
            padding: 40px;
            border-radius: 15px;
            cursor: pointer;
        }

        input {
            margin: 5px;
            padding: 8px;
        }

        .form {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<h1>Banking App</h1>

<form method="POST" class="form">
    <input type="text" name="name" placeholder="Name" required><br>
    <input type="number" step="0.01" name="amount" placeholder="Amount"><br>

    <div class="grid">
        <button class="box" name="action" value="create">Create</button>
        <button class="box" name="action" value="deposit">Deposit</button>
        <button class="box" name="action" value="withdraw">Withdraw</button>
        <button class="box" name="action" value="balance">Balance</button>
    </div>
</form>

<h2>{{ message }}</h2>

</body>
</html>
